<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>{% block title %}Rockkstaar Trade Assistant{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
  <link rel="stylesheet" href="{{ url_for('static', filename='css/quick_mode.css') }}" />
</head>
<body>

  <!-- ===== NAV ===== -->
  <nav class="navbar">
    <a href="{{ url_for('dashboard') }}" class="nav-brand">
      <img src="{{ url_for('static', filename='logo.png') }}"
           alt="Rockkstaar"
           class="nav-logo"
           onerror="this.style.display='none';this.nextElementSibling.style.display='inline';" />
      <span class="brand-icon" style="display:none;">◈</span>
      ROCKKSTAAR
    </a>
    <div class="nav-links">
      <a href="{{ url_for('dashboard') }}"  class="nav-link {% if request.endpoint == 'dashboard' %}nav-link-active{% endif %}">Dashboard</a>
      <a href="{{ url_for('quick_mode') }}" class="nav-link nav-link-quick {% if request.endpoint == 'quick_mode' %}nav-link-active{% endif %}" title="Mobile quick view">⚡ Quick</a>
      <a href="{{ url_for('journal') }}"   class="nav-link {% if request.endpoint == 'journal' %}nav-link-active{% endif %}">Journal</a>
    </div>
    <div class="nav-actions">
      <span id="ws-status-pill" class="ws-status-pill ws-polling">POLLING</span>
      <span id="ar-last-updated" class="ar-last-updated"></span>
      <button id="alert-sound-toggle" class="btn-ar-toggle ar-on" onclick="toggleAlertSound()" title="Sound alerts for new triggers">🔔 Sound ON</button>
      <button id="ar-toggle" class="btn-ar-toggle ar-on" onclick="toggleAutoRefresh()" title="Auto-refresh every 15s during market hours">⟳ Auto ON</button>
      <form action="{{ url_for('refresh_all') }}" method="POST" style="display:inline;">
        <button type="submit" class="btn btn-refresh">⟳ Refresh All</button>
      </form>
    </div>
  </nav>

  <!-- ===== FLASH MESSAGES ===== -->
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
      <div class="flash-container">
        {% for category, message in messages %}
          <div class="flash flash-{{ category }}">{{ message }}</div>
        {% endfor %}
      </div>
    {% endif %}
  {% endwith %}

  <!-- ===== PAGE CONTENT ===== -->
  <main class="main-content">
    {% block content %}{% endblock %}
  </main>

  <script src="{{ url_for('static', filename='js/ws_manager.js') }}"></script>
  <script src="{{ url_for('static', filename='js/main.js') }}"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
