<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Rockkstaar Trade Assistant{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}" />
</head>
<body>

  <!-- ===== NAV ===== -->
  <nav class="navbar">
    <a href="{{ url_for('dashboard') }}" class="nav-brand">
      <span class="brand-icon">◈</span> ROCKKSTAAR
    </a>
    <div class="nav-links">
      <a href="{{ url_for('dashboard') }}" class="nav-link {% if request.endpoint == 'dashboard' %}nav-link-active{% endif %}">Dashboard</a>
      <a href="{{ url_for('journal') }}"   class="nav-link {% if request.endpoint == 'journal' %}nav-link-active{% endif %}">Journal</a>
    </div>
    <div class="nav-actions">
      <form action="{{ url_for('refresh_all') }}" method="POST" style="display:inline;">
        <button type="submit" class="btn btn-refresh">⟳ Refresh All</button>
      </form>
    </div>
  </nav>

  <!-- ===== FLASH MESSAGES ===== -->
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
      <div class="flash-container">
        {% for category, message in messages %}
          <div class="flash flash-{{ category }}">{{ message }}</div>
        {% endfor %}
      </div>
    {% endif %}
  {% endwith %}

  <!-- ===== PAGE CONTENT ===== -->
  <main class="main-content">
    {% block content %}{% endblock %}
  </main>

  <script src="{{ url_for('static', filename='js/main.js') }}"></script>
  {% block scripts %}{% endblock %}
</body>
</html>
